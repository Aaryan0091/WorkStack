<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkStack Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="WorkStack" class="logo">
      <h1>WorkStack</h1>
    </div>

    <div class="status">
      <div class="status-indicator" id="statusIndicator">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Checking...</span>
      </div>
    </div>

    <div class="current-tab" id="currentTabSection" style="display: none;">
      <p class="label">Currently Tracking:</p>
      <p class="tab-title" id="currentTabTitle">-</p>
      <p class="tab-url" id="currentTabUrl">-</p>
    </div>

    <div class="quick-actions">
      <button id="addToCollectionBtn" class="btn-quick" title="Add to a collection">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        Add to Collection
      </button>
      <button id="addBookmarkBtn" class="btn-quick" title="Save as bookmark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
        </svg>
        Add as Bookmark
      </button>
    </div>

    <!-- Notification popup -->
    <div id="notification" class="notification" style="display: none;">
      <span id="notificationIcon"></span>
      <span id="notificationText"></span>
    </div>

    <!-- Collection selector modal -->
    <div id="collectionModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Select Collection</h3>
          <button id="closeModalBtn" class="close-btn">&times;</button>
        </div>
        <div id="collectionList" class="collection-list">
          <!-- Collections will be loaded here -->
        </div>
      </div>
    </div>

    <div class="summary">
      <div class="summary-item">
        <span class="summary-value" id="todayTabs">-</span>
        <span class="summary-label">Tabs Today</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="todayTime">-</span>
        <span class="summary-label">Time Today</span>
      </div>
    </div>

    <div class="actions">
      <button id="toggleBtn" class="btn btn-primary">
        <span id="toggleBtnText">Start Tracking</span>
      </button>
      <button id="dashboardBtn" class="btn btn-secondary">
        Open Dashboard
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
